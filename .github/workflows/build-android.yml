name: Build Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Type de build'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - development

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 🔄 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🔧 Install Expo CLI
        run: npm install -g @expo/cli

      - name: 🔑 Inject environment variables
        run: |
          echo "EXPO_PUBLIC_EBAY_CLIENT_ID=${{ secrets.EXPO_PUBLIC_EBAY_CLIENT_ID }}" >> .env
          echo "EXPO_PUBLIC_EBAY_CLIENT_SECRET=${{ secrets.EXPO_PUBLIC_EBAY_CLIENT_SECRET }}" >> .env
          echo "EXPO_PUBLIC_EBAY_SANDBOX=false" >> .env

      - name: 🔑 Setup keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
          ls -la android/app/release.keystore

      - name: 🏗️ Build Release APK
        if: ${{ github.event.inputs.build_type != 'development' }}
        run: |
          export PATH="$(npm bin -g):$PATH"
          export NODE_OPTIONS="--max-old-space-size=4096"
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.daemon=false
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

      - name: 📤 Upload APK
        if: ${{ github.event.inputs.build_type != 'development' }}
        uses: actions/upload-artifact@v4
        with:
          name: cardvault-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: 🏗️ Build Development APK
        if: ${{ github.event.inputs.build_type == 'development' }}
        run: |
          export PATH="$(npm bin -g):$PATH"
          cd android
          ./gradlew assembleDebug \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.daemon=false
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

      - name: 📤 Upload Development APK
        if: ${{ github.event.inputs.build_type == 'development' }}
        uses: actions/upload-artifact@v4
        with:
          name: cardvault-development-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
