name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 🔄 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🔧 Install Expo CLI
        run: npm install -g @expo/cli

      - name: 🔑 Inject environment variables
        run: |
          echo "EXPO_PUBLIC_EBAY_CLIENT_ID=${{ secrets.EXPO_PUBLIC_EBAY_CLIENT_ID }}" >> .env
          echo "EXPO_PUBLIC_EBAY_CLIENT_SECRET=${{ secrets.EXPO_PUBLIC_EBAY_CLIENT_SECRET }}" >> .env
          echo "EXPO_PUBLIC_EBAY_SANDBOX=false" >> .env

      - name: 🏗️ Prebuild Android
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 🔍 Affiche build.gradle complet
        run: cat android/app/build.gradle

      - name: 🔧 Patch build.gradle ligne 33
        run: |
          NODE=$(which node)
          echo "Node path: $NODE"
          
          # Affiche la ligne problématique
          echo "=== Ligne 33 avant patch ==="
          sed -n '33p' android/app/build.gradle
          
          # Remplace TOUS les "node" dans les execute() par le chemin absolu
          sed -i "s|\"node\"|\"${NODE}\"|g" android/app/build.gradle
          sed -i "s|'node'|'${NODE}'|g" android/app/build.gradle
          
          echo "=== Ligne 33 après patch ==="
          sed -n '33p' android/app/build.gradle

      - name: 🔑 Setup keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: 🏗️ Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.daemon=false
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cardvault-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: 🏗️ Build Release AAB
        run: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.daemon=false
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

      - name: 📤 Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: cardvault-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 7
