name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 🔄 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🔧 Install Expo CLI
        run: npm install -g @expo/cli

      - name: 🔑 Inject environment variables
        run: |
          echo "EXPO_PUBLIC_EBAY_CLIENT_ID=${{ secrets.EXPO_PUBLIC_EBAY_CLIENT_ID }}" >> .env
          echo "EXPO_PUBLIC_EBAY_CLIENT_SECRET=${{ secrets.EXPO_PUBLIC_EBAY_CLIENT_SECRET }}" >> .env
          echo "EXPO_PUBLIC_EBAY_SANDBOX=false" >> .env

      - name: 🏗️ Prebuild Android
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 🔧 Patch build.gradle — résolution statique
        run: |
          NODE=$(which node)
          PROJECT_ROOT=$(pwd)
          ENTRY=$(node -e "require('expo/scripts/resolveAppEntry')" "$PROJECT_ROOT" android absolute 2>/dev/null || echo "index.js")
          RN_DIR=$(node --print "require.resolve('react-native/package.json')" | xargs dirname)
          CODEGEN_DIR=$(node --print "require.resolve('@react-native/codegen/package.json', { paths: [require.resolve('react-native/package.json')] })" | xargs dirname)
          EXPO_CLI=$(node --print "require.resolve('@expo/cli', { paths: [require.resolve('expo/package.json')] })")

          echo "Entry: $ENTRY"
          echo "RN dir: $RN_DIR"
          echo "Codegen: $CODEGEN_DIR"
          echo "Expo CLI: $EXPO_CLI"

          # Patch build.gradle avec les vrais chemins
          cat > /tmp/gradle_patch.py << 'PYEOF'
          import re, sys

          entry   = sys.argv[1]
          rn_dir  = sys.argv[2]
          codegen = sys.argv[3]
          cli     = sys.argv[4]

          with open('android/app/build.gradle', 'r') as f:
              content = f.read()

          # Remplace les blocs dynamiques par des chemins statiques
          content = re.sub(
              r'entryFile\s*=\s*file\(\[.*?\]\)',
              f'entryFile = file("{entry}")',
              content, flags=re.DOTALL
          )
          content = re.sub(
              r'reactNativeDir\s*=\s*new File\(\[.*?package\.json.*?\]\)',
              f'reactNativeDir = new File("{rn_dir}")',
              content, flags=re.DOTALL
          )
          content = re.sub(
              r'codegenDir\s*=\s*new File\(\[.*?codegen.*?\]\)',
              f'codegenDir = new File("{codegen}")',
              content, flags=re.DOTALL
          )
          content = re.sub(
              r'cliFile\s*=\s*new File\(\[.*?\]\)',
              f'cliFile = new File("{cli}")',
              content, flags=re.DOTALL
          )

          with open('android/app/build.gradle', 'w') as f:
              f.write(content)

          print("build.gradle patché!")
          PYEOF

          python3 /tmp/gradle_patch.py "$ENTRY" "$RN_DIR" "$CODEGEN_DIR" "$EXPO_CLI"
          echo "--- build.gradle lignes 30-40 après patch ---"
          sed -n '30,42p' android/app/build.gradle

      - name: 🔑 Setup keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: 🏗️ Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.daemon=false
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cardvault-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: 🏗️ Build Release AAB
        run: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.daemon=false
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

      - name: 📤 Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: cardvault-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 7
