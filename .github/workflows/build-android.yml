name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 🔄 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🔧 Install Expo CLI
        run: npm install -g @expo/cli

      - name: 🔑 Inject environment variables
        run: |
          echo "EXPO_PUBLIC_EBAY_CLIENT_ID=${{ secrets.EXPO_PUBLIC_EBAY_CLIENT_ID }}" >> .env
          echo "EXPO_PUBLIC_EBAY_CLIENT_SECRET=${{ secrets.EXPO_PUBLIC_EBAY_CLIENT_SECRET }}" >> .env
          echo "EXPO_PUBLIC_EBAY_SANDBOX=false" >> .env

      - name: 🏗️ Prebuild Android
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 🔍 Debug — vérifie node et les chemins
        run: |
          echo "Node: $(which node) — $(node --version)"
          echo "NPM: $(which npm)"
          echo "NODE_PATH: $NODE_PATH"
          node -e "console.log('expo path:', require.resolve('expo/package.json'))"
          node -e "console.log('react-native path:', require.resolve('react-native/package.json'))"
          cat android/app/build.gradle | sed -n '30,36p'

      - name: 🔑 Setup keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: 🏗️ Build Release APK
        run: |
          export NODE_PATH="$(pwd)/node_modules"
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.daemon=false \
            --stacktrace 2>&1 | tail -50
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cardvault-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7
